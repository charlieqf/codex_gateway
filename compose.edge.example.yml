services:
  caddy:
    image: caddy:2
    restart: unless-stopped
    depends_on:
      - gateway
    env_file:
      - ./config/gateway.container.env
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./ops/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
