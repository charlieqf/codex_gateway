# Example only. Do not install this file on the shared VM without an approved
# maintenance window, a dedicated hostname, and reviewed TLS certificates.

server {
    listen 80;
    listen [::]:80;
    server_name trial-gateway.example.com;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name trial-gateway.example.com;

    ssl_certificate /etc/letsencrypt/live/trial-gateway.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/trial-gateway.example.com/privkey.pem;

    client_max_body_size 5m;

    location / {
        proxy_pass http://127.0.0.1:18787;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600;
        proxy_send_timeout 3600;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}
